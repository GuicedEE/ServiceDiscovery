apiVersion: v1
kind: Namespace
metadata:
  name: service-discovery-test
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: discovery-test-sa
  namespace: service-discovery-test
---
apiVersion: v1
kind: Secret
metadata:
  name: discovery-test-sa-token
  namespace: service-discovery-test
  annotations:
    kubernetes.io/service-account.name: discovery-test-sa
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: endpoint-reader
  namespace: service-discovery-test
rules:
  - apiGroups: ["", "discovery.k8s.io"]
    resources: ["endpoints", "endpointslices", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discovery-test-sa-binding
  namespace: service-discovery-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: endpoint-reader
subjects:
  - kind: ServiceAccount
    name: discovery-test-sa
    namespace: service-discovery-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
  namespace: service-discovery-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          hostPort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-service
  namespace: service-discovery-test
spec:
  type: NodePort
  selector:
    app: hello-service
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080




